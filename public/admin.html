<script>

async function carregar(){

  const res = await fetch("/admin-clientes");
  const clientes = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML="";

  clientes.forEach(c=>{

    const pago =
      c.pagamentos?.some(p=>p.status==="approved");

    const div = document.createElement("div");

    // cores de status
    if(c.grupo_enviado){
      div.className="card enviado";
    } else if(pago){
      div.className="card";
      div.style.borderLeft="8px solid #00c853"; // verde
    } else {
      div.className="card";
      div.style.borderLeft="8px solid #ffc107"; // amarelo
    }

    div.innerHTML = `
      <strong>${c.nome}</strong><br>
      📧 ${c.email}<br>
      📱 ${c.telefone}<br><br>

      Status:
      ${
        c.grupo_enviado
          ? "✅ Grupo enviado"
          : pago
            ? "🟢 Pago"
            : "🟡 Aguardando pagamento"
      }
      <br><br>

      <button class="copy"
        onclick="copiar('${c.telefone}')">
        Copiar WhatsApp
      </button>

      ${
        pago && !c.grupo_enviado
        ? `<button class="done"
            onclick="enviado(${c.id})">
            Marcar enviado
           </button>`
        : ""
      }
    `;

    lista.appendChild(div);
  });
}

function copiar(numero){
  navigator.clipboard.writeText(numero);
  alert("Número copiado!");
}

async function enviado(id){
  await fetch("/marcar-enviado/"+id,{
    method:"POST"
  });
  carregar();
}

carregar();

</script>
