<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aguardando pagamento PIX</title>

<style>

body{
  margin:0;
  background:#000124;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:500px;
  width:100%;
  background:#06063a;
  padding:30px 25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h2{
  font-size:clamp(22px,6vw,30px);
  margin-bottom:15px;
}

p{
  font-size:18px;
  opacity:0.9;
  margin-bottom:30px;
}

button{
  width:100%;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#BAFF00;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

.info{
  margin-top:20px;
  font-size:14px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<h2>🟢 Aguardando pagamento PIX...</h2>

<p>
Após realizar o pagamento no seu banco,<br>
clique no botão abaixo para liberar seu acesso.
</p>

<button onclick="irVerificar()">
✅ Já paguei
</button>

<div class="info">
A confirmação pode levar alguns segundos.
</div>

</div>

<script>
function irVerificar(){
  window.location.href="/sucesso.html";
}
</script>

</body>
</html>
