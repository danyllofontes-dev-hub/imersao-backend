<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Confirmando pagamento...</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 500px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>✅ Pagamento recebido</h1>
    <p>Estamos confirmando seu acesso...</p>
    <p>Aguarde alguns segundos.</p>
  </div>

<script>

async function verificarPagamento() {

  // pega parâmetros da URL
  const params = new URLSearchParams(window.location.search);

  const paymentId = params.get("payment_id");
  const status = params.get("status");

  // segurança básica
  if (!paymentId || status !== "approved") {
    document.body.innerHTML =
      "<h2>Pagamento ainda não confirmado.</h2>";
    return;
  }

  try {

    const resposta = await fetch(
      "https://imersao-backend.onrender.com/verificar-pagamento/" + paymentId
    );

    const data = await resposta.json();

    if (data.approved) {

      // ✅ LIBERA ACESSO
      window.location.href = "acesso.html";

    } else {

      // tenta novamente
      setTimeout(verificarPagamento, 5000);
    }

  } catch (error) {
    console.log(error);
  }
}

verificarPagamento();

</script>

</body>
</html>
