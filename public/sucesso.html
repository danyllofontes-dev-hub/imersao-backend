<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Verificando pagamento...</title>
</head>

<body style="font-family: Arial; text-align:center; margin-top:80px;">

<h2>🔎 Confirmando seu pagamento...</h2>
<p>Aguarde alguns segundos.</p>

<script>

const params = new URLSearchParams(window.location.search);

// Mercado Pago envia payment_id automaticamente
const paymentId = params.get("payment_id");

if(!paymentId){
  document.body.innerHTML = "<h2>Pagamento não encontrado.</h2>";
}

// consulta seu backend
fetch(`https://imersao-backend.onrender.com/acesso/${paymentId}`)
.then(res => res.json())
.then(data => {

  if(data.acesso){

    // REDIRECIONA PARA AREA LIBERADA
    window.location.href = "/acesso.html";

  } else {

    document.body.innerHTML = `
      <h2>⏳ Aguardando confirmação...</h2>
      <p>Se você pagou via PIX aguarde alguns segundos e atualize.</p>
    `;
  }

})
.catch(() => {
  document.body.innerHTML = "<h2>Erro ao verificar pagamento.</h2>";
});

</script>

</body>
</html>
